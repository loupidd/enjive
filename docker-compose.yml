services:
  # ── MySQL ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: enjive_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ${DB_NAME:-enjive_db}
      MYSQL_USER: ${DB_USER:-enjive}
      MYSQL_PASSWORD: ${DB_PASSWORD:-enjive_secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enjive_net

  # ── Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enjive_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      UPLOADS_DIR: /app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app
    ports:
      - "3000:3000"
    networks:
      - enjive_net

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enjive_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - enjive_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: enjive_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - enjive_net

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local

networks:
  enjive_net:
    driver: bridge
